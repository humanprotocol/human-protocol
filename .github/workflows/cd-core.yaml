name: Publish core package

permissions:
  id-token: write # required for OIDC on npm
  contents: write # needed to push tags

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from"
        required: false
        default: "develop"
      npm_tag:
        description: "npm dist-tag to use when publishing manually (e.g., alpha, beta)"
        required: false
        default: "latest"
      push_git_tags:
        description: "Push git tags after publishing (true/false)"
        required: false
        default: "false"

jobs:
  publish-core:
    name: Publish core to NPM
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_TAG: ${{ github.event.inputs.npm_tag }}
      PUSH_GIT_TAGS: ${{ github.event.inputs.push_git_tags }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.GH_GITBOOK_TOKEN }}
      - name: Setup git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          registry-url: "https://registry.npmjs.org"
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build core package
        run: yarn workspace @human-protocol/core build
      - name: Publish core package
        run: yarn workspace @human-protocol/core npm publish --tolerate-republish --tag ${NPM_PUBLISH_TAG} --json | tee publish-core.log
        env:
          SKIP_PREPACK: true
      - name: Tag published packages
        if: ${{ env.PUSH_GIT_TAGS == 'true' }}
        run: node scripts/tag-published-packages.mjs publish-core.log
      - name: Push created tags
        if: ${{ env.PUSH_GIT_TAGS == 'true' }}
        run: git push origin --tags
