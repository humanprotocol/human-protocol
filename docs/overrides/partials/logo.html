<a href="{{ config.extra.logo_href }}"
   class="md-header__button md-logo"
   aria-label="{{ config.site_name }}"
   target="_self">
  {% if config.theme.logo %}
    <img src="{{ config.theme.logo | url }}" alt="{{ config.site_name }}">
  {% else %}
    {% include ".icons/material/library.svg" %}
  {% endif %}
</a>
