specVersion: 1.0.0
description: '{{ description }}'
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - kind: ethereum
    name: HMToken
    network: '{{ network }}'
    source:
      abi: HMToken
      address: '{{ HMToken.address }}'
      startBlock: {{ HMToken.startBlock }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - HMTokenStatistics
        - Holder
        - EventDayData
        - UniqueSender
        - UniqueReceiver
      abis:
        - name: HMToken
          file: '{{{ HMToken.abi }}}'
      eventHandlers:
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: BulkApproval(indexed uint256,uint256)
          handler: handleBulkApproval
        - event: BulkTransfer(indexed uint256,uint256)
          handler: handleBulkTransfer
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mapping/HMToken.ts
